services:
  mytradingmind_dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["python", "scripts/start_dashboard.py", "--foreground", "--address", "0.0.0.0", "--port", "8501"]
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../reports:/app/reports
      - ../logs:/app/logs
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5

  mytradingmind_runtime:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["python", "-m", "mytradingmind.runtime", "start", "--mode", "headless"]
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../reports:/app/reports
      - ../logs:/app/logs
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scanner:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["python", "scripts/live_scan_binance.py", "--loop", "--database", "--sleep", "300", "--transport", "python"]
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../reports:/app/reports
      - ../logs:/app/logs
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json, pathlib, datetime; p=pathlib.Path('/app/reports/live_scan_heartbeat.json'); data=json.loads(p.read_text()); ts=datetime.datetime.fromisoformat(data['generated_at'].replace('Z','+00:00')); age=(datetime.datetime.now(datetime.timezone.utc)-ts).total_seconds(); raise SystemExit(0 if age < 900 else 1)\""]
      interval: 60s
      timeout: 5s
      retries: 5

  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-bots}
      MARIADB_USER: ${MARIADB_USER:-tradeuser}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-change_me}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-change_root_me}
    ports:
      - "${MARIADB_HOST_PORT:-3307}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MARIADB_ROOT_PASSWORD:-change_root_me}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mariadb_data:
